# Active profile (override via -Dspring.profiles.active=prod)
spring.profiles.active=dev
# Server
server.port=8080
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-handlers-package=com.playerscores.typehandler
# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
# API Key
api.key=${API_KEY}
# Hypixel
hypixel.api-key=${HYPIXEL_API_KEY:}
# Rating (OpenSkill Weng-Lin Plackett-Luce; displayed elo = startingElo + ordinalScale * (mu - 3*sigma))
elo.floor=100
elo.starting-elo=1000
elo.ordinal-scale=10
elo.mu=25.0
elo.sigma=8.333333333333334
elo.beta=4.166666666666667
elo.kappa=0.0001
elo.tau=0.0
elo.recompute-delay-ms=5000
# Party
party.invite-ttl-minutes=60
party.max-size=16
party.invite-expiry-check-delay-ms=60000
# Webhook
webhook.enabled=true
webhook.url=http://backend.ranked.bowspleef.net:3000/internal/match-result
webhook.secret=${WEBHOOK_SECRET:}
# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
