# Active profile (override via -Dspring.profiles.active=prod)
spring.profiles.active=dev
# Server
server.port=8080
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-handlers-package=com.playerscores.typehandler
# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
# Hypixel
hypixel.api-key=${HYPIXEL_API_KEY:}
# ELO
elo.floor=100
elo.starting-elo=1000
elo.provisional-threshold=10
elo.established-threshold=30
elo.k-provisional=40
elo.k-developing=20
elo.k-established=10
elo.recompute-delay-ms=5000
# Webhook
webhook.enabled=true
webhook.url=http://localhost:3000/internal/match-result
webhook.secret=${WEBHOOK_SECRET:}
# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
